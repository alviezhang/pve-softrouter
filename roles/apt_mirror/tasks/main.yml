---
- name: Switch apt sources to the mirror
  when: apt_mirror_enabled | bool
  block:
    - name: Check if legacy sources.list exists
      when: ansible_distribution == "Debian"
      ansible.builtin.stat:
        path: /etc/apt/sources.list
      register: _sources_list

    - name: Read existing sources.list
      when:
        - ansible_distribution == "Debian"
        - _sources_list.stat.exists
      ansible.builtin.slurp:
        src: /etc/apt/sources.list
      register: _sources_list_content

    - name: Determine whether legacy sources.list is active
      when: ansible_distribution == "Debian"
      ansible.builtin.set_fact:
        # Active only if it actually contains an uncommented `deb ` line. A fresh
        # DEB822-native host (trixie) may keep an empty/placeholder sources.list,
        # which must NOT trigger the legacy migration (it would drop components).
        _legacy_sources_active: >-
          {{ _sources_list.stat.exists
             and ((_sources_list_content.content | default('') | b64decode)
                  | regex_findall('(?m)^\s*deb\s') | length > 0) }}

    - name: Check legacy entries for non-official or unsupported forms
      when: ansible_distribution == "Debian"
      ansible.builtin.set_fact:
        # Uncommented deb/deb-src lines whose URI is NOT *.debian.org. If any
        # exist we leave sources.list alone: migrating would silently drop
        # third-party repos or custom mirrors.
        _legacy_foreign_lines: >-
          {{ (_sources_list_content.content | default('') | b64decode)
             | regex_findall('(?m)^\s*deb(?:-src)?\s+(?:\[[^\]]*\]\s+)?(\S+)')
             | reject('search', '^https?://(?:[a-z0-9-]+\.)*debian\.org(?:[:/]|$)')
             | list }}
        # Active lines with bracket options ([arch=..] etc.) or deb-src: our
        # two plain stanzas cannot represent them, so their presence also
        # skips the migration. Fresh PVE installs never have them.
        _legacy_unsupported_lines: >-
          {{ (_sources_list_content.content | default('') | b64decode)
             | regex_findall('(?m)^\s*(deb-src\s.*|deb\s+\[[^\]]*\].*)') | list }}

    - name: Migrate legacy Debian sources to DEB822
      when:
        - ansible_distribution == "Debian"
        - _legacy_sources_active | default(false) | bool
        - _legacy_foreign_lines | default([]) | length == 0
        - _legacy_unsupported_lines | default([]) | length == 0
      block:
        - name: Extract components from sources.list
          ansible.builtin.set_fact:
            _debian_components: >-
              {{ (((_sources_list_content.content | b64decode)
                  | regex_search('(?m)^\s*deb\s+\S+\s+' + ansible_distribution_release + '\s+(.+)', '\1'))
                 or ['main']) | first | split | unique | join(' ') }}

        - name: Add Debian sources
          ansible.builtin.template:
            src: debian.sources.j2
            dest: /etc/apt/sources.list.d/debian.sources
            mode: "0644"
          vars:
            debian_components: "{{ _debian_components }}"

        - name: Back up legacy sources.list (timestamped so reruns never clobber it; apt ignores .bak)
          ansible.builtin.command:
            argv: [mv, /etc/apt/sources.list, "/etc/apt/sources.list.{{ ansible_date_time.epoch }}.bak"]
          changed_when: true

    - name: Report skipped legacy migration (non-official or unsupported entries)
      when:
        - ansible_distribution == "Debian"
        - _legacy_sources_active | default(false) | bool
        - >-
          (_legacy_foreign_lines | default([]) | length > 0) or
          (_legacy_unsupported_lines | default([]) | length > 0)
      ansible.builtin.debug:
        msg: >-
          sources.list 含第三方源或带选项([arch=…])/deb-src 条目,不自动迁移
          (第三方: {{ _legacy_foreign_lines | join(', ') }};
          选项/deb-src: {{ _legacy_unsupported_lines | join(' | ') }})——
          请自行换源。

    - name: Repoint native DEB822 Debian sources to the mirror
      when:
        - ansible_distribution == "Debian"
        - not (_legacy_sources_active | default(false) | bool)
      block:
        - name: Check for DEB822 debian.sources
          ansible.builtin.stat:
            path: /etc/apt/sources.list.d/debian.sources
          register: _debian_sources_deb822

        - name: Swap Debian mirror host in debian.sources (preserve components/suites)
          when: _debian_sources_deb822.stat.exists
          ansible.builtin.replace:
            path: /etc/apt/sources.list.d/debian.sources
            # Replace only the URI host (deb.debian.org, security.debian.org,
            # ftp.*.debian.org) with the mirror base; path suffixes (/debian,
            # /debian-security) are kept. The lookahead anchors the host
            # boundary so a longer host that merely contains ".debian.org" is
            # not partially rewritten.
            regexp: 'https?://(?:[a-z0-9-]+\.)*debian\.org(?=[:/\s]|$)'
            replace: "{{ debian_mirror | regex_replace('/+$', '') }}"

    - name: Check for Proxmox VE
      ansible.builtin.stat:
        path: /etc/pve
      register: _pve_check

    - name: Configure Proxmox no-subscription repo
      when: _pve_check.stat.exists
      vars:
        _cfg: "{{ _proxmox.pve }}"
      block:
        - name: Inspect candidate enterprise repo files
          ansible.builtin.stat:
            path: "/etc/apt/sources.list.d/{{ item }}"
          loop: "{{ _cfg.enterprise_files }}"
          register: _ent_stat

        - name: Read candidate enterprise repo files
          when: item.stat.exists
          ansible.builtin.slurp:
            src: "{{ item.stat.path }}"
          loop: "{{ _ent_stat.results }}"
          loop_control:
            label: "{{ item.item }}"
          register: _ent_content

        - name: Remove repos that point at enterprise.proxmox.com
          # Delete only when the file has at least one ACTIVE URL line and
          # every active URL line is the enterprise host. Files where the
          # enterprise reference is only a comment, or that mix in an active
          # custom mirror, are left alone. Trimmed-line matching covers both
          # .list and DEB822 .sources (both carry the URL on an active line).
          when:
            - not (item is skipped)
            - >-
              (item.content | b64decode).splitlines()
              | map('trim') | reject('match', '^(#|$)')
              | select('search', 'https?://') | list | length > 0
            - >-
              (item.content | b64decode).splitlines()
              | map('trim') | reject('match', '^(#|$)')
              | select('search', 'https?://')
              | reject('search', 'enterprise\.proxmox\.com') | list | length == 0
          ansible.builtin.file:
            path: "{{ item.source }}"
            state: absent
          loop: "{{ _ent_content.results }}"
          loop_control:
            label: "{{ item.item.item | default('skipped') }}"

        - name: Add no-subscription repo
          ansible.builtin.template:
            src: proxmox.sources.j2
            dest: "/etc/apt/sources.list.d/{{ _cfg.repo_file }}"
            mode: "0644"

- name: Update APT cache and optionally upgrade
  ansible.builtin.apt:
    # No cache_valid_time: this role may have just rewritten the sources, so the
    # cache must always be refreshed against them before upgrade/install.
    update_cache: true
    upgrade: "{{ 'full' if apt_upgrade_enabled | bool else 'no' }}"
  # A fresh PVE still has the 401ing enterprise repo when the mirror switch is
  # off; don't run (and fail) apt update unless something actually needs it.
  when:
    - ansible_distribution in ["Ubuntu", "Debian"]
    - (apt_mirror_enabled | bool) or (apt_upgrade_enabled | bool) or (packages | length > 0)

- name: Install packages
  ansible.builtin.package:
    name: "{{ packages }}"
    state: present
  when: packages | length > 0
